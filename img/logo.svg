<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" width="220" height="40" aria-hidden="true">
  <!-- Стикер робота в стиле Seopapa: дружелюбный, узнаваемый -->
  <g transform="translate(2, 2)">
    <!-- Тень/подложка для объёма -->
    <ellipse cx="18" cy="34" rx="14" ry="4" fill="rgba(0,0,0,0.08)"/>
    <!-- Тело робота -->
    <rect x="4" y="18" width="28" height="14" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.8"/>
    <rect x="8" y="21" width="20" height="6" rx="2" fill="#cbd5e1"/>
    <circle cx="14" cy="24" r="1.5" fill="#64748b"/>
    <circle cx="22" cy="24" r="1.5" fill="#64748b"/>
    <!-- Голова -->
    <rect x="6" y="4" width="24" height="18" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.8"/>
    <!-- Антенна -->
    <path d="M18 5v-2.5" stroke="#64748b" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="18" cy="1.8" r="1.8" fill="#ea580c"/>
    <!-- Глаза-дисплей -->
    <rect x="9" y="9" width="8" height="5" rx="2" fill="#0f172a"/>
    <rect x="19" y="9" width="8" height="5" rx="2" fill="#0f172a"/>
    <circle cx="12" cy="11.5" r="0.8" fill="#22c55e"/>
    <circle cx="22" cy="11.5" r="0.8" fill="#22c55e"/>
    <!-- Улыбка -->
    <path d="M11 15.2c1.5 1 3.5 1.5 5.5 1.2s3.5-1 5-2" stroke="#64748b" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  </g>
  <text x="48" y="27" font-family="Manrope, system-ui, sans-serif" font-size="20" font-weight="600" fill="#0f172a" letter-spacing="-0.02em">Agressor</text>
</svg>
